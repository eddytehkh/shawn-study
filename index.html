<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #FAFAF7;
    color: #2D2D2D;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100dvh;
  }
  #root { overflow: hidden; width: 100%; height: 100dvh; }

  a { text-decoration: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #E8E8E4; border-radius: 2px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes flipCard {
    0%   { transform: rotateY(0deg); }

    100% { transform: rotateY(0deg); opacity: 1; }

  .flip-anim { animation: flipCard 0.35s ease both; }

  .screen-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(74px + env(safe-area-inset-bottom));

    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-top: 1px solid #E8E8E4;
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;

    padding-top: 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_ID  = "1igXw6erw9gLv8gMKmyuIh5v1tm832RPWoHEeSkeuMws";
const CLIENT_ID = "1010155063550-4fabe4f96jhvuoa3euiknkett484gsp5.apps.googleusercontent.com";
const SCOPES    = "https://www.googleapis.com/auth/spreadsheets";
const NEW_CARD_CAP = 5; // Issue 3: max new cards per session

const CARDS_SHEET = "Cards";
const LOG_SHEET   = "Progress Log";
const NOTES_SHEET = "Notes";

const C = {
  bg:        "#FAFAF7",
  primary:   "#8BAF8B",
  secondary: "#9BA8C4",
  card:      "#FFFFFF",
  border:    "#E8E8E4",
  again:     "#E8927C",
  hard:      "#D4A847",
  good:      "#8BAF8B",
  easy:      "#9BA8C4",
  text:      "#2D2D2D",
  muted:     "#7A7A7A",
  orange:    "#F0833A",
};

// ── SM-2 ──────────────────────────────────────────────────────────────────────
function applySM2(card, rating) {
  let ef       = parseFloat(card.easeFactor) || 2.5;
  let rep      = parseInt(card.repCount)     || 0;
  let interval = parseFloat(card.interval)   || 1;
  let newEF = ef, newInterval = 1, newRep = rep;

  if (rating === 0) {
    newRep = 0; newInterval = 1;
    newEF  = Math.max(1.3, ef - 0.2);
  } else {
    newRep = rep + 1;
    if      (newRep === 1) newInterval = 1;
    else if (newRep === 2) newInterval = 6;
    else                   newInterval = Math.round(interval * ef);
    if (rating === 1) { newEF = Math.max(1.3, ef - 0.15); newInterval = Math.max(1, Math.round(newInterval * 0.7)); }
    if (rating === 3) { newEF = Math.min(3.0, ef + 0.1);  newInterval = Math.round(newInterval * 1.3); }
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const next  = new Date(today); next.setDate(today.getDate() + newInterval);

  return {
    ...card,
    interval:       newInterval,
    easeFactor:     Math.round(newEF * 100) / 100,
    repCount:       newRep,
    nextReviewDate: next.toISOString().split("T")[0],
    lastReviewed:   today.toISOString().split("T")[0],
  };
}

// ── SHEETS API ────────────────────────────────────────────────────────────────
const base = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

async function sheetGet(range) {
  const res = await fetch(`${base}/values/${encodeURIComponent(range)}`, {
    headers: { Authorization: `Bearer ${window._gToken}` },
  });
  if (!res.ok) throw new Error(`Read error ${res.status}`);
  return (await res.json()).values || [];
}

async function sheetUpdate(range, values) {
  const res = await fetch(`${base}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, {
    method: "PUT",
    headers: { Authorization: `Bearer ${window._gToken}`, "Content-Type": "application/json" },
    body: JSON.stringify({ range, majorDimension: "ROWS", values }),
  });
  if (!res.ok) throw new Error(`Write error ${res.status}`);
}

async function sheetAppend(range, values) {
  const res = await fetch(`${base}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, {
    method: "POST",
    headers: { Authorization: `Bearer ${window._gToken}`, "Content-Type": "application/json" },
    body: JSON.stringify({ range, majorDimension: "ROWS", values }),
  });
  if (!res.ok) throw new Error(`Append error ${res.status}`);
}

// ── PARSERS ───────────────────────────────────────────────────────────────────
function parseCards(rows) {
  if (rows.length < 2) return [];
  return rows.slice(1).map((r, i) => ({
    cardId:         r[0]  || "",
    yearLevel:      r[1]  || "",
    examPeriod:     r[2]  || "",
    subject:        r[3]  || "",
    deck:           r[4]  || "",
    front:          r[5]  || "",
    back:           r[6]  || "",
    difficulty:     r[7]  || "",
    nextReviewDate: r[8]  || "",
    lastReviewed:   r[9]  || "",
    interval:       r[10] || "1",
    easeFactor:     r[11] || "2.5",
    repCount:       r[12] || "0",
    _row: i + 2,
  }));
}
function parseNotes(rows) {
  if (rows.length < 2) return [];
  return rows.slice(1).map(r => ({
    yearLevel:  r[0] || "",
    examPeriod: r[1] || "",
    subject:    r[2] || "",
    chapter:    r[3] || "",
    docLink:    r[4] || "",
  }));
}
function parseLogs(rows) {
  if (rows.length < 2) return [];
  return rows.slice(1).map(r => ({
    date:      r[0] || "",
    cardId:    r[1] || "",
    rating:    r[2] || "",
    timeSpent: r[3] || "",
  }));
}

// ── ISSUE 4: TEXT TO SPEECH ───────────────────────────────────────────────────
function detectLang(text) {
  // Check for Chinese characters
  if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(text)) return "zh";
  // Check for Malay keywords / common BM patterns
  if (/\b(yang|dan|di|ke|dari|untuk|dengan|pada|adalah|ini|itu|tidak|boleh|akan|telah|dalam|juga)\b/i.test(text)) return "ms";
  return "en";
}

function speak(text, onEnd) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const lang = detectLang(text);
  const utter = new SpeechSynthesisUtterance(text);

  // Try to find a matching voice
  const voices = window.speechSynthesis.getVoices();
  const langMap = { zh: ["zh-CN","zh-TW","zh"], ms: ["ms-MY","ms"], en: ["en-GB","en-US","en"] };
  const preferred = langMap[lang] || ["en"];
  let voice = null;
  for (const code of preferred) {
    voice = voices.find(v => v.lang.startsWith(code));
    if (voice) break;
  }
  if (voice) utter.voice = voice;
  utter.lang  = lang === "zh" ? "zh-CN" : lang === "ms" ? "ms-MY" : "en-US";
  utter.rate  = 0.9;
  utter.pitch = 1;
  if (onEnd) utter.onend = onEnd;
  window.speechSynthesis.speak(utter);
}

function stopSpeak() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// ── ICONS ─────────────────────────────────────────────────────────────────────
function Ico({ n, size=22, color }) {
  const p = { fill:"none", stroke:color||"currentColor", strokeWidth:"1.8", strokeLinecap:"round", strokeLinejoin:"round" };
  const icons = {
    home:    <><path {...p} d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline {...p} points="9 22 9 12 15 12 15 22"/></>,
    cards:   <><rect {...p} x="2" y="4" width="20" height="16" rx="3"/><line {...p} x1="2" y1="10" x2="22" y2="10"/></>,
    notes:   <><path {...p} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline {...p} points="14 2 14 8 20 8"/><line {...p} x1="16" y1="13" x2="8" y2="13"/><line {...p} x1="16" y1="17" x2="8" y2="17"/></>,
    chart:   <><line {...p} x1="18" y1="20" x2="18" y2="10"/><line {...p} x1="12" y1="20" x2="12" y2="4"/><line {...p} x1="6" y1="20" x2="6" y2="14"/></>,
    back:    <><line {...p} x1="19" y1="12" x2="5" y2="12"/><polyline {...p} points="12 19 5 12 12 5"/></>,
    ext:     <><path {...p} d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline {...p} points="15 3 21 3 21 9"/><line {...p} x1="10" y1="14" x2="21" y2="3"/></>,
    chev:    <polyline {...p} points="9 18 15 12 9 6"/>,
    refresh: <><polyline {...p} points="23 4 23 10 17 10"/><path {...p} d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>,
    google:  <path fill={color||"white"} stroke="none" d="M20.283 10.356h-8.327v3.451h4.792c-.446 2.193-2.313 3.453-4.792 3.453a5.27 5.27 0 0 1-5.279-5.28 5.27 5.27 0 0 1 5.279-5.279c1.259 0 2.397.447 3.29 1.178l2.6-2.599c-1.584-1.381-3.615-2.233-5.89-2.233a8.908 8.908 0 0 0-8.934 8.934 8.908 8.908 0 0 0 8.934 8.934c4.467 0 8.529-3.249 8.529-8.934 0-.528-.081-1.097-.202-1.625z"/>,
    // Speaker icons
    speaker: <><polygon {...p} points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path {...p} d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path {...p} d="M15.54 8.46a5 5 0 0 1 0 7.07"/></>,
    speakerOff: <><polygon {...p} points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line {...p} x1="23" y1="9" x2="17" y2="15"/><line {...p} x1="17" y1="9" x2="23" y2="15"/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{display:"block",flexShrink:0}} aria-hidden="true">{icons[n]}</svg>;
}

// ── FILTER SELECT ─────────────────────────────────────────────────────────────
function FilterSelect({ label, value, options, onChange }) {
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4 }}>{label}</div>
      <select
        value={value}
        onChange={e => onChange(e.target.value)}
        style={{
          width:"100%", padding:"11px 14px", borderRadius:12,
          border:`1.5px solid ${value ? C.primary : "#E0E0DC"}`,
          background: value ? `${C.primary}10` : C.card,
          color:C.text, fontSize:14, fontWeight:600,
          appearance:"none", WebkitAppearance:"none",
        }}
      >
        <option value="">All</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,         setTab]         = useState("home");
  const [authed,      setAuthed]      = useState(false);
  const [authLoading, setAuthLoading] = useState(false);
  const [cards,       setCards]       = useState([]);
  const [notes,       setNotes]       = useState([]);
  const [logs,        setLogs]        = useState([]);
  const [loading,     setLoading]     = useState(false);
  const [error,       setError]       = useState(null);

  const [studyFilter, setStudyFilter] = useState({ yearLevel:"", examPeriod:"", subject:"", deck:"" });
  const [queue,       setQueue]       = useState([]);
  const [qIdx,        setQIdx]        = useState(0);
  const [flipped,     setFlipped]     = useState(false);
  const [studying,    setStudying]    = useState(false);
  const [cardKey,     setCardKey]     = useState(0);
  const [manualMode,  setManualMode]  = useState(false);
  const [speaking,    setSpeaking]    = useState(false);
  const sessionStart = useRef(null);

  const today = useMemo(() => {
    const d = new Date(); d.setHours(0,0,0,0);
    return d.toISOString().split("T")[0];
  }, []);

  // ── ISSUE 2: Persist token in localStorage ─────────────────────────────────
  useEffect(() => {
    // Check for saved token first
    const saved = localStorage.getItem("sf_token");
    const expiry = localStorage.getItem("sf_token_expiry");
    if (saved && expiry && Date.now() < parseInt(expiry)) {
      window._gToken = saved;
      setAuthed(true);
    }

    // Load GSI script
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = () => {
      window._tokenClient = window.google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: resp => {
          if (resp.access_token) {
            window._gToken = resp.access_token;
            // Save token with 55-minute expiry (tokens last 60min, refresh at 55)
            localStorage.setItem("sf_token", resp.access_token);
            localStorage.setItem("sf_token_expiry", String(Date.now() + 55 * 60 * 1000));
            setAuthed(true);
            setAuthLoading(false);
          } else {
            setAuthLoading(false);
          }
        },
      });
    };
    document.head.appendChild(s);
  }, []);

  // Auto-refresh token before it expires
  useEffect(() => {
    if (!authed) return;
    const expiry = parseInt(localStorage.getItem("sf_token_expiry") || "0");
    const msLeft = expiry - Date.now();
    if (msLeft <= 0) return;
    // Schedule silent refresh 2 min before expiry
    const timer = setTimeout(() => {
      window._tokenClient?.requestAccessToken({ prompt: "" });
    }, Math.max(0, msLeft - 2 * 60 * 1000));
    return () => clearTimeout(timer);
  }, [authed]);

  const handleAuth = () => {
    setAuthLoading(true);
    setError(null);
    window._tokenClient?.requestAccessToken({ prompt: "consent" });
  };

  const handleSignOut = () => {
    localStorage.removeItem("sf_token");
    localStorage.removeItem("sf_token_expiry");
    window._gToken = null;
    setAuthed(false);
    setCards([]); setNotes([]); setLogs([]);
  };

  // ── Load data ──────────────────────────────────────────────────────────────
  const loadData = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [cr, nr, lr] = await Promise.all([
        sheetGet(`${CARDS_SHEET}!A:M`),
        sheetGet(`${NOTES_SHEET}!A:E`),
        sheetGet(`${LOG_SHEET}!A:D`),
      ]);
      setCards(parseCards(cr));
      setNotes(parseNotes(nr));
      setLogs(parseLogs(lr));
    } catch(e) {
      // If 401, token expired — clear and re-auth
      if (e.message.includes("401")) {
        handleSignOut();
      } else {
        setError(e.message);
      }
    }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { if (authed) loadData(); }, [authed]);

  // ── Derived ────────────────────────────────────────────────────────────────
  const today2 = today; // alias
  const dueCards = useMemo(
    () => cards.filter(c => c.nextReviewDate && c.nextReviewDate <= today2 && c.repCount !== "0"),
    [cards, today2]
  );
  const newCards = useMemo(
    () => cards.filter(c => !c.nextReviewDate || c.nextReviewDate === "" || c.repCount === "0"),
    [cards]
  );

  const streak = useMemo(() => {
    const dates = [...new Set(logs.map(l => l.date).filter(Boolean))].sort().reverse();
    let s = 0, d = new Date(); d.setHours(0,0,0,0);
    for (const date of dates) {
      if (date === d.toISOString().split("T")[0]) { s++; d.setDate(d.getDate()-1); }
      else break;
    }
    return s;
  }, [logs]);

  const todayLogs = useMemo(() => logs.filter(l => l.date === today), [logs, today]);

  const yearLevels  = [...new Set(cards.map(c=>c.yearLevel).filter(Boolean))].sort();
  const examPeriods = (yL)      => [...new Set(cards.filter(c=>!yL||c.yearLevel===yL).map(c=>c.examPeriod).filter(Boolean))].sort();
  const subjects    = (yL,eP)   => [...new Set(cards.filter(c=>(!yL||c.yearLevel===yL)&&(!eP||c.examPeriod===eP)).map(c=>c.subject).filter(Boolean))].sort();
  const decks       = (yL,eP,s) => [...new Set(cards.filter(c=>(!yL||c.yearLevel===yL)&&(!eP||c.examPeriod===eP)&&(!s||c.subject===s)).map(c=>c.deck).filter(Boolean))].sort();

  // ── ISSUE 3: Build session queue with new card cap ─────────────────────────
  const buildQueue = (filter, allCards = false) => {
    const f = filter || studyFilter;
    const match = c =>
      (!f.yearLevel  || c.yearLevel  === f.yearLevel)  &&
      (!f.examPeriod || c.examPeriod === f.examPeriod) &&
      (!f.subject    || c.subject    === f.subject)    &&
      (!f.deck       || c.deck       === f.deck);

    if (allCards) {
      return cards.filter(match);
    }

    // Due cards (already reviewed before, due today)
    const due = cards.filter(c => match(c) && c.nextReviewDate && c.nextReviewDate <= today && c.repCount !== "0");
    // New cards (never reviewed) — cap at NEW_CARD_CAP
    const newOnes = cards.filter(c => match(c) && (!c.nextReviewDate || c.nextReviewDate === "" || c.repCount === "0"))
                         .slice(0, NEW_CARD_CAP);
    return [...due, ...newOnes];
  };

  const startStudy = (filter, allCards = false) => {
    const pool = buildQueue(filter, allCards);
    if (!pool.length) return;
    setQueue(pool); setQIdx(0); setFlipped(false);
    setStudying(true); setManualMode(allCards);
    setCardKey(k=>k+1);
    sessionStart.current = Date.now();
    setSpeaking(false);
    stopSpeak();
    setTab("study");
  };

  // ── Rate card ──────────────────────────────────────────────────────────────
  const rateCard = async (rating) => {
    stopSpeak(); setSpeaking(false);
    const card    = queue[qIdx];
    const updated = applySM2(card, rating);
    const spent   = Math.round((Date.now() - (sessionStart.current || Date.now())) / 1000);
    sessionStart.current = Date.now();

    setCards(prev => prev.map(c => c.cardId === card.cardId ? updated : c));

    try {
      await sheetUpdate(`${CARDS_SHEET}!H${card._row}:M${card._row}`, [[
        updated.difficulty, updated.nextReviewDate, updated.lastReviewed,
        updated.interval, updated.easeFactor, updated.repCount,
      ]]);
      await sheetAppend(`${LOG_SHEET}!A:D`, [[today, card.cardId, rating, spent]]);
      setLogs(prev => [...prev, { date:today, cardId:card.cardId, rating:String(rating), timeSpent:String(spent) }]);
    } catch(e) { console.error("Write error:", e); }

    const next = qIdx + 1;
    if (next >= queue.length) { setStudying(false); setTab("home"); }
    else { setQIdx(next); setFlipped(false); setCardKey(k=>k+1); }
  };

  // ── ISSUE 4: Speak handler ─────────────────────────────────────────────────
  const handleSpeak = (text) => {
    if (speaking) {
      stopSpeak();
      setSpeaking(false);
    } else {
      setSpeaking(true);
      speak(text, () => setSpeaking(false));
    }
  };

  // ── Sign in screen ─────────────────────────────────────────────────────────
  if (!authed) return (
    <div style={{ height:"100dvh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"2rem", background:C.bg }}>
      <div style={{ textAlign:"center", marginBottom:"2rem" }}>
        <div style={{ fontSize:64, marginBottom:12 }}>📚</div>
        <h1 style={{ fontSize:28, fontWeight:800 }}>StudyFlow</h1>
        <p style={{ color:C.muted, fontSize:15, marginTop:4 }}>Shawn's revision companion</p>
      </div>
      {error && (
        <div style={{ background:"#FEE2E2", color:"#991B1B", borderRadius:12, padding:"10px 16px", fontSize:13, marginBottom:16, maxWidth:320, textAlign:"center" }}>
          {error}
        </div>
      )}
      <button
        onClick={handleAuth}
        disabled={authLoading}
        style={{ display:"flex", alignItems:"center", gap:10, padding:"15px 28px", borderRadius:16, background:authLoading?"#ccc":C.text, color:"#fff", fontSize:16, fontWeight:700, width:"100%", maxWidth:320, justifyContent:"center" }}
      >
        <Ico n="google" size={20} color="#fff"/>
        {authLoading ? "Signing in…" : "Sign in with Google"}
      </button>
      <p style={{ color:C.muted, fontSize:12, marginTop:16, textAlign:"center", maxWidth:280 }}>
        Your data lives in Google Sheets — nothing stored on this device.
      </p>
    </div>
  );

  // ── Study active screen ────────────────────────────────────────────────────
  if (studying && tab === "study") {
    const card      = queue[qIdx];
    const remaining = queue.length - qIdx;
    const progress  = (qIdx / queue.length) * 100;
    const currentText = flipped ? card.back : card.front;

    return (
      <div style={{ height:"100dvh", display:"flex", flexDirection:"column", background:C.bg }}>
        {/* Header */}
        <div style={{ padding:"16px 20px 10px", display:"flex", alignItems:"center", gap:12 }}>
          <button
            onClick={() => { stopSpeak(); setSpeaking(false); setStudying(false); setTab("study"); }}
            style={{ width:36, height:36, borderRadius:10, background:C.card, border:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}
          >
            <Ico n="back" size={18} color={C.text}/>
          </button>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:12, color:C.muted, marginBottom:5, fontWeight:600 }}>
              {card.subject} · {card.deck}
              {manualMode && <span style={{ marginLeft:6, color:C.secondary, fontSize:11 }}>📝 Manual</span>}
            </div>
            <div style={{ height:6, background:C.border, borderRadius:3, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${progress}%`, background:C.primary, borderRadius:3, transition:"width 0.4s ease" }}/>
            </div>
          </div>
          <span style={{ fontSize:13, fontWeight:700, color:C.muted, minWidth:48, textAlign:"right" }}>{remaining} left</span>
        </div>

        {/* Card */}
        <div style={{ flex:1, padding:"8px 20px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div
            key={cardKey}
            className={flipped ? "flip-anim" : "fade-up"}
            style={{ flex:1, background:C.card, borderRadius:24, padding:"2rem 1.5rem", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", position:"relative", minHeight:0 }}
          >
            {/* Label */}
            <div style={{ position:"absolute", top:16, left:0, right:0, textAlign:"center" }}>
              <span style={{ fontSize:11, fontWeight:700, letterSpacing:1.5, color:flipped?C.muted:C.primary, textTransform:"uppercase" }}>
                {flipped ? "Answer" : "Question"}
              </span>
            </div>

            {/* ISSUE 4: Speaker button top-right */}
            <button
              onClick={() => handleSpeak(currentText)}
              style={{
                position:"absolute", top:12, right:16,
                width:36, height:36, borderRadius:10,
                background: speaking ? `${C.primary}20` : "transparent",
                display:"flex", alignItems:"center", justifyContent:"center",
                border: speaking ? `1.5px solid ${C.primary}` : "1.5px solid transparent",
                transition:"all 0.2s",
              }}
            >
              <Ico n={speaking ? "speakerOff" : "speaker"} size={18} color={speaking ? C.primary : C.muted}/>
            </button>

            <p style={{ fontSize:flipped?18:22, fontWeight:flipped?500:700, textAlign:"center", lineHeight:1.6, color:C.text, overflowY:"auto", maxHeight:"100%", padding:"0 8px" }}>
              {currentText}
            </p>
          </div>

          {/* Buttons — ISSUE 1: safe area bottom */}
          <div className="study-buttons">
            {!flipped ? (
              <button
                onClick={() => { setSpeaking(false); stopSpeak(); setFlipped(true); }}
                style={{ width:"100%", padding:16, borderRadius:16, background:C.primary, color:"#fff", fontSize:16, fontWeight:800 }}
              >
                Reveal Answer
              </button>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[["Again",0,C.again],["Hard",1,C.hard],["Good",2,C.good],["Easy",3,C.easy]].map(([label,rating,color]) => (
                  <button
                    key={label}
                    onClick={() => rateCard(rating)}
                    style={{ padding:"15px 10px", borderRadius:14, background:color, color:"#fff", fontSize:16, fontWeight:800 }}
                  >
                    {label}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── Main shell ─────────────────────────────────────────────────────────────
  const allDueCount = [...dueCards, ...newCards.slice(0, NEW_CARD_CAP)].length;

  return (
    <div style={{ height:"100dvh", display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto" }}>
      {loading && (
        <div style={{ padding:"12px 20px", display:"flex", alignItems:"center", gap:8, background:"#F0F4F0", borderBottom:`1px solid #E0E8E0` }}>
          <Ico n="refresh" size={16} color={C.primary}/>
          <span style={{ fontSize:13, color:C.primary, fontWeight:600 }}>Loading your data…</span>
        </div>
      )}
      {error && !loading && (
        <div style={{ padding:"12px 20px", background:"#FEE2E2", borderBottom:`1px solid #FECACA` }}>
          <span style={{ fontSize:13, color:"#991B1B", fontWeight:600 }}>⚠️ {error}</span>
        </div>
      )}

      <div className="screen-scroll">
        {tab==="home"     && <HomeScreen     cards={cards} dueCards={dueCards} newCards={newCards} streak={streak} todayLogs={todayLogs} onStart={startStudy} today={today} allDueCount={allDueCount}/>}
        {tab==="study"    && <StudyScreen    cards={cards} dueCards={dueCards} newCards={newCards} filter={studyFilter} setFilter={setStudyFilter} onStart={startStudy} yearLevels={yearLevels} examPeriods={examPeriods} subjects={subjects} decks={decks} today={today} buildQueue={buildQueue}/>}
        {tab==="notes"    && <NotesScreen    notes={notes} yearLevels={yearLevels} examPeriods={examPeriods} subjects={subjects}/>}
        {tab==="progress" && <ProgressScreen cards={cards} logs={logs} streak={streak} todayLogs={todayLogs} dueCards={dueCards} today={today} onSignOut={handleSignOut}/>}
      </div>

      {/* Bottom nav */}
      <div className="bottom-nav">
        {[["home","home","Home"],["study","cards","Study"],["notes","notes","Notes"],["progress","chart","Progress"]].map(([id,icon,label]) => (
          <button key={id} onClick={() => { setTab(id); setStudying(false); stopSpeak(); setSpeaking(false); }} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"10px 0", color:tab===id?C.primary:C.muted, transition:"color 0.15s" }}>
            <Ico n={icon} size={22} color={tab===id?C.primary:C.muted}/>
            <span style={{ fontSize:11, fontWeight:tab===id?700:500 }}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── HOME SCREEN ───────────────────────────────────────────────────────────────
function HomeScreen({ cards, dueCards, newCards, streak, todayLogs, onStart, today, allDueCount }) {
  const decksDue = useMemo(() => {
    const map = {};
    // combine due + new (capped) for home display
    const combined = [
      ...dueCards,
      ...newCards.slice(0, NEW_CARD_CAP),
    ];
    combined.forEach(c => {
      const k = `${c.yearLevel}||${c.examPeriod}||${c.subject}||${c.deck}`;
      if (!map[k]) map[k] = { ...c, count:0 };
      map[k].count++;
    });
    return Object.values(map);
  }, [dueCards, newCards]);

  return (
    <div className="fade-up" style={{ padding:"28px 20px 0" }}>
      <h1 style={{ fontSize:26, fontWeight:800 }}>Hey Shawn 👋</h1>
      <p style={{ color:C.muted, fontSize:15, marginTop:2, marginBottom:20 }}>Ready to study?</p>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
        <div style={{ background:C.card, borderRadius:16, padding:"14px 16px", border:`1px solid ${C.border}` }}>
          <p style={{ fontSize:12, color:C.muted, fontWeight:600, marginBottom:4 }}>Due today</p>
          <p style={{ fontSize:30, fontWeight:800, color:C.secondary, lineHeight:1 }}>{dueCards.length}</p>
          {newCards.length > 0 && <p style={{ fontSize:11, color:C.muted, marginTop:4 }}>+{Math.min(newCards.length, NEW_CARD_CAP)} new</p>}
        </div>
        <div style={{ background:C.card, borderRadius:16, padding:"14px 16px", border:`1px solid ${C.border}` }}>
          <p style={{ fontSize:12, color:C.muted, fontWeight:600, marginBottom:4 }}>Streak 🔥</p>
          <p style={{ fontSize:30, fontWeight:800, color:C.orange, lineHeight:1 }}>{streak}<span style={{ fontSize:14, fontWeight:600, marginLeft:2 }}>days</span></p>
        </div>
      </div>

      {allDueCount > 0 ? (
        <button
          onClick={() => onStart({}, false)}
          style={{ width:"100%", padding:18, borderRadius:18, background:C.primary, color:"#fff", fontSize:17, fontWeight:800, marginBottom:20, boxShadow:`0 4px 16px ${C.primary}40` }}
        >
          ✨ Start Studying ({allDueCount} cards)
        </button>
      ) : (
        <div style={{ background:C.card, borderRadius:18, padding:"1.5rem", textAlign:"center", marginBottom:20, border:`1px solid ${C.border}` }}>
          <p style={{ fontSize:36, marginBottom:8 }}>🎉</p>
          <p style={{ fontWeight:800 }}>All caught up!</p>
          <p style={{ fontSize:14, color:C.muted, marginTop:4 }}>No cards due today.</p>
        </div>
      )}

      {decksDue.length > 0 && (
        <>
          <p style={{ fontSize:13, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.8, marginBottom:10 }}>Due by deck</p>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {decksDue.map(d => (
              <button
                key={`${d.yearLevel}${d.examPeriod}${d.subject}${d.deck}`}
                onClick={() => onStart({ yearLevel:d.yearLevel, examPeriod:d.examPeriod, subject:d.subject, deck:d.deck }, false)}
                style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", textAlign:"left" }}
              >
                <div>
                  <div style={{ fontSize:14, fontWeight:700 }}>{d.deck}</div>
                  <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{d.subject} · {d.examPeriod}</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:C.primary, background:`${C.primary}18`, padding:"3px 10px", borderRadius:20 }}>{d.count}</span>
                  <Ico n="chev" size={16} color={C.muted}/>
                </div>
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── STUDY SCREEN ──────────────────────────────────────────────────────────────
function StudyScreen({ cards, dueCards, newCards, filter, setFilter, onStart, yearLevels, examPeriods, subjects, decks, today, buildQueue }) {
  const f = filter;

  const sessionCards = buildQueue(f, false);
  const allCards     = buildQueue(f, true);

  return (
    <div className="fade-up" style={{ padding:"28px 20px 0" }}>
      <h1 style={{ fontSize:22, fontWeight:800, marginBottom:20 }}>Study 🎴</h1>

      <div style={{ background:C.card, borderRadius:18, padding:"1.25rem", border:`1px solid ${C.border}`, marginBottom:16 }}>
        <FilterSelect label="Year Level"  value={f.yearLevel}  options={yearLevels}                                onChange={v => setFilter({ yearLevel:v, examPeriod:"", subject:"", deck:"" })}/>
        <FilterSelect label="Exam Period" value={f.examPeriod} options={examPeriods(f.yearLevel)}                  onChange={v => setFilter({ ...f, examPeriod:v, subject:"", deck:"" })}/>
        <FilterSelect label="Subject"     value={f.subject}    options={subjects(f.yearLevel, f.examPeriod)}        onChange={v => setFilter({ ...f, subject:v, deck:"" })}/>
        <FilterSelect label="Deck"        value={f.deck}       options={decks(f.yearLevel, f.examPeriod, f.subject)} onChange={v => setFilter({ ...f, deck:v })}/>
      </div>

      {/* Due / new breakdown */}
      <div style={{ background:`${C.secondary}15`, borderRadius:14, padding:"12px 16px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
        <div style={{ textAlign:"center" }}>
          <p style={{ fontSize:22, fontWeight:800, color:C.text }}>{sessionCards.filter(c=>c.repCount!=="0").length}</p>
          <p style={{ fontSize:11, color:C.muted, fontWeight:600 }}>Due</p>
        </div>
        <div style={{ width:1, background:C.border }}/>
        <div style={{ textAlign:"center" }}>
          <p style={{ fontSize:22, fontWeight:800, color:C.primary }}>{sessionCards.filter(c=>c.repCount==="0"||!c.nextReviewDate).length}</p>
          <p style={{ fontSize:11, color:C.muted, fontWeight:600 }}>New (max {NEW_CARD_CAP})</p>
        </div>
        <div style={{ width:1, background:C.border }}/>
        <div style={{ textAlign:"center" }}>
          <p style={{ fontSize:22, fontWeight:800, color:C.secondary }}>{allCards.length}</p>
          <p style={{ fontSize:11, color:C.muted, fontWeight:600 }}>Total</p>
        </div>
      </div>

      <button
        onClick={() => onStart(f, false)}
        disabled={sessionCards.length === 0}
        style={{ width:"100%", padding:16, borderRadius:16, marginBottom:10, background:sessionCards.length===0?"#E0E0DC":C.primary, color:sessionCards.length===0?C.muted:"#fff", fontSize:15, fontWeight:800 }}
      >
        {sessionCards.length === 0 ? "No cards due today" : `📅 Start Session — ${sessionCards.length} cards`}
      </button>

      <button
        onClick={() => onStart(f, true)}
        disabled={allCards.length === 0}
        style={{ width:"100%", padding:16, borderRadius:16, background:allCards.length===0?"#E0E0DC":C.card, color:allCards.length===0?C.muted:C.secondary, fontSize:15, fontWeight:800, border:`2px solid ${allCards.length===0?"#E0E0DC":C.secondary}` }}
      >
        {allCards.length === 0 ? "No cards found" : `📝 Revise Deck — ${allCards.length} cards`}
      </button>

      <p style={{ fontSize:12, color:C.muted, textAlign:"center", marginTop:10, lineHeight:1.5 }}>
        Revise Deck ignores due dates — use for extra practice anytime.
      </p>
    </div>
  );
}

// ── NOTES SCREEN ──────────────────────────────────────────────────────────────
function NotesScreen({ notes, yearLevels, examPeriods, subjects }) {
  const [f, setF] = useState({ yearLevel:"", examPeriod:"", subject:"" });

  const filtered = notes.filter(n =>
    (!f.yearLevel  || n.yearLevel  === f.yearLevel)  &&
    (!f.examPeriod || n.examPeriod === f.examPeriod) &&
    (!f.subject    || n.subject    === f.subject)
  );
  const grouped = filtered.reduce((acc, n) => {
    const k = n.subject || "Other";
    if (!acc[k]) acc[k] = [];
    acc[k].push(n); return acc;
  }, {});

  const Chip = ({ label, active, onPress }) => (
    <button onClick={onPress} style={{ padding:"6px 14px", borderRadius:20, whiteSpace:"nowrap", fontSize:13, fontWeight:700, border:`1.5px solid ${active?C.secondary:"#E0E0DC"}`, background:active?C.secondary:C.card, color:active?"#fff":C.muted, transition:"all 0.15s" }}>
      {label}
    </button>
  );

  return (
    <div className="fade-up" style={{ padding:"28px 20px 0" }}>
      <h1 style={{ fontSize:22, fontWeight:800, marginBottom:16 }}>Notes 📖</h1>
      <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:8, marginBottom:6 }}>
        {yearLevels.map(y => <Chip key={y} label={y} active={f.yearLevel===y} onPress={() => setF(f.yearLevel===y?{yearLevel:"",examPeriod:"",subject:""}:{yearLevel:y,examPeriod:"",subject:""})}/>)}
      </div>
      {f.yearLevel && (
        <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:8, marginBottom:6 }}>
          {examPeriods(f.yearLevel).map(e => <Chip key={e} label={e} active={f.examPeriod===e} onPress={() => setF(f.examPeriod===e?{...f,examPeriod:"",subject:""}:{...f,examPeriod:e,subject:""})}/>)}
        </div>
      )}
      {(f.yearLevel||f.examPeriod) && (
        <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:8, marginBottom:12 }}>
          {subjects(f.yearLevel,f.examPeriod).map(s => <Chip key={s} label={s} active={f.subject===s} onPress={() => setF(f.subject===s?{...f,subject:""}:{...f,subject:s})}/>)}
        </div>
      )}
      {Object.keys(grouped).length === 0 ? (
        <div style={{ textAlign:"center", color:C.muted, padding:"3rem 0" }}>
          <p style={{ fontSize:40, marginBottom:8 }}>🗒️</p>
          <p style={{ fontWeight:700, color:C.text }}>No notes yet</p>
          <p style={{ fontSize:14, marginTop:4 }}>Add entries to the Notes tab in Google Sheets</p>
        </div>
      ) : Object.entries(grouped).map(([subj,chaps]) => (
        <div key={subj} style={{ marginBottom:20 }}>
          <p style={{ fontSize:12, fontWeight:700, color:C.primary, textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>{subj}</p>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {chaps.map((n,i) => (
              <a key={i} href={n.docLink} target="_blank" rel="noopener noreferrer"
                style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 16px", background:C.card, borderRadius:14, border:`1px solid ${C.border}` }}
              >
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{n.chapter}</div>
                  <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{n.examPeriod}</div>
                </div>
                <Ico n="ext" size={16} color={C.secondary}/>
              </a>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── PROGRESS SCREEN ───────────────────────────────────────────────────────────
function ProgressScreen({ cards, logs, streak, todayLogs, dueCards, today, onSignOut }) {
  const last7 = useMemo(() => {
    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const ds = d.toISOString().split("T")[0];
      days.push({ date:ds, count:logs.filter(l=>l.date===ds).length, label:i===0?"Today":d.toLocaleDateString("en-MY",{weekday:"short"}) });
    }
    return days;
  }, [logs]);
  const maxCount = Math.max(...last7.map(d=>d.count), 1);

  const deckStats = useMemo(() => {
    const map = {};
    cards.forEach(c => {
      const k = `${c.subject} · ${c.deck}`;
      if (!map[k]) map[k] = { k, total:0, due:0 };
      map[k].total++;
      if (c.nextReviewDate && c.nextReviewDate <= today) map[k].due++;
    });
    return Object.values(map).sort((a,b)=>b.due-a.due);
  }, [cards, today]);

  return (
    <div className="fade-up" style={{ padding:"28px 20px 0" }}>
      <h1 style={{ fontSize:22, fontWeight:800, marginBottom:20 }}>Progress 📊</h1>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:20 }}>
        {[[streak,"Streak","days",C.orange],[todayLogs.length,"Today","cards",C.primary],[dueCards.length,"Due","cards",C.secondary]].map(([val,label,unit,color]) => (
          <div key={label} style={{ background:C.card, borderRadius:14, padding:"12px 10px", border:`1px solid ${C.border}`, textAlign:"center" }}>
            <p style={{ fontSize:24, fontWeight:800, color, lineHeight:1 }}>{val}</p>
            <p style={{ fontSize:10, color:C.muted, fontWeight:700, marginTop:3, lineHeight:1.4 }}>{label}<br/>{unit}</p>
          </div>
        ))}
      </div>

      <div style={{ background:C.card, borderRadius:18, padding:"1.25rem", border:`1px solid ${C.border}`, marginBottom:16 }}>
        <p style={{ fontSize:14, fontWeight:700, marginBottom:16 }}>Cards reviewed — last 7 days</p>
        <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:100 }}>
          {last7.map(({date,count,label}) => (
            <div key={date} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:10, fontWeight:700, color:count>0?C.primary:C.muted, minHeight:14 }}>{count||""}</span>
              <div style={{ width:"100%", borderRadius:5, background:count>0?C.primary:C.border, height:`${Math.max(4,(count/maxCount)*72)}px`, transition:"height 0.4s ease" }}/>
              <span style={{ fontSize:10, color:C.muted, fontWeight:600 }}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      {deckStats.length > 0 && (
        <div style={{ background:C.card, borderRadius:18, padding:"1.25rem", border:`1px solid ${C.border}`, marginBottom:16 }}>
          <p style={{ fontSize:14, fontWeight:700, marginBottom:16 }}>Deck breakdown</p>
          {deckStats.map(({k,total,due}) => (
            <div key={k} style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                <span style={{ fontSize:13, fontWeight:600 }}>{k}</span>
                <span style={{ fontSize:12, color:C.muted }}>{due} due / {total}</span>
              </div>
              <div style={{ height:6, background:C.border, borderRadius:3, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${total>0?((total-due)/total)*100:0}%`, background:C.primary, borderRadius:3, transition:"width 0.6s ease" }}/>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Sign out */}
      <button
        onClick={onSignOut}
        style={{ width:"100%", padding:"12px", borderRadius:14, border:`1.5px solid ${C.border}`, color:C.muted, fontSize:14, fontWeight:700, marginBottom:20 }}
      >
        Sign out
      </button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
